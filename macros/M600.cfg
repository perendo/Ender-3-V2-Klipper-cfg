[gcode_macro M600]
description: Cambio de filamento avanzado
gcode:
    SAVE_GCODE_STATE NAME=M600_state

    M300

    PAUSE

    G91
    G1 E-5 F1800
    G1 Z10 F600
    G90
    G1 X0 Y220 F6000

    RESPOND TYPE=command MSG="Cambia el filamento y pulsa RESUME"

    # Al reanudar
    G91
    G1 E20 F300         ; purga
    G1 E-2 F1800        ; pequeña retracción
    G90

    RESTORE_GCODE_STATE NAME=M600_state
